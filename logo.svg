<svg width="480" height="110" viewBox="0 0 480 110" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text { fill: #0f172a; }
    .sub-text { fill: #64748b; }
    .logo-accent { fill: #2563eb; }
    
    @media (prefers-color-scheme: dark) {
      .main-text { fill: #f8fafc; }
      .sub-text { fill: #94a3b8; }
      .logo-accent { fill: #3b82f6; }
    }
  </style>

  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <clipPath id="boxClip">
      <rect x="20" y="15" width="80" height="80" rx="18" />
    </clipPath>
  </defs>

  <rect x="20" y="15" width="80" height="80" rx="18" fill="url(#boxGrad)"/>
  
  <g clip-path="url(#boxClip)">
    <g stroke="#ffffff" stroke-width="1" opacity="0.15">
      <line x1="20" y1="35" x2="100" y2="35"/>
      <line x1="20" y1="55" x2="100" y2="55"/>
      <line x1="20" y1="75" x2="100" y2="75"/>
      <line x1="40" y1="15" x2="40" y2="95"/>
      <line x1="60" y1="15" x2="60" y2="95"/>
      <line x1="80" y1="15" x2="80" y2="95"/>
    </g>

    <path d="M 20 95 L 20 70 L 40 55 L 60 65 L 85 35 L 100 45 L 100 95 Z" fill="#ffffff" opacity="0.15"/>
  </g>

  <path d="M 28 72 L 44 52 L 60 62 L 82 32" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="44" cy="52" r="3" fill="#ffffff"/>
  <circle cx="60" cy="62" r="3" fill="#ffffff"/>
  
  <circle cx="82" cy="32" r="5" fill="#ffffff"/>
  <circle cx="82" cy="32" r="2" fill="#1d4ed8"/>

  <text x="124" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="700" class="main-text" letter-spacing="-1">
    Market<tspan class="logo-accent">Lab</tspan>
  </text>

  <text x="127" y="85" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" font-weight="600" class="sub-text" letter-spacing="3.5">
    QUANTITATIVE RESEARCH FRAMEWORK
  </text>
</svg>      <line x1="40" y1="20" x2="40" y2="100"/>
      <line x1="60" y1="20" x2="60" y2="100"/>
      <line x1="80" y1="20" x2="80" y2="100"/>
    </g>

    <!-- area -->
    <path d="M20 100 L20 70 L40 60 L60 65 L80 40 L100 50 L100 100 Z"
          fill="white" opacity="0.15"/>

  </g>

  <!-- main trend line -->
  <path d="M30 75 L45 55 L60 62 L80 38"
        stroke="white"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- points -->
  <circle cx="45" cy="55" r="3" fill="white"/>
  <circle cx="60" cy="62" r="3" fill="white"/>

  <!-- target -->
  <circle cx="80" cy="38" r="6" fill="white"/>
  <circle cx="80" cy="38" r="2" fill="#1d4ed8"/>

  <!-- Name -->
  <text x="130" y="60"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1"
        class="main-text">

    Market<tspan class="accent">Lab</tspan>
  </text>

  <!-- Subtitle -->
  <text x="132" y="90"
        font-family="ui-monospace, SFMono-Regular, Consolas, Menlo, monospace"
        font-size="13"
        font-weight="600"
        letter-spacing="3"
        class="sub-text">

    QUANTITATIVE RESEARCH FRAMEWORK
  </text>

</svg>
