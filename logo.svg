<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Icon: single clean shape — rising bar with a dot -->
  <rect x="20" y="20" width="80" height="80" rx="20" fill="url(#g)"/>

  <!-- Three bars growing left to right — minimal -->
  <rect x="34" y="72" width="12" height="20" rx="3" fill="white" opacity="0.4"/>
  <rect x="52" y="56" width="12" height="36" rx="3" fill="white" opacity="0.7"/>
  <rect x="70" y="38" width="12" height="54" rx="3" fill="white"/>

  <!-- Signal dot above tallest bar -->
  <circle cx="76" cy="32" r="5" fill="white"/>

  <!-- Wordmark -->
  <text x="120" y="72"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40" font-weight="700" letter-spacing="-1"
        fill="#0f172a">Market<tspan fill="url(#g)">Lab</tspan></text>

  <!-- Tagline -->
  <text x="122" y="96"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11.5" font-weight="500" letter-spacing="2.5"
        fill="#94a3b8">QUANTITATIVE RESEARCH FRAMEWORK</text>

</svg>
