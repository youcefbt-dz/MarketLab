<svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">

  <style>
    .main-text { fill: #0f172a; }
    .sub-text { fill: #64748b; }
    .accent { fill: #2563eb; }

    @media (prefers-color-scheme: dark) {
      .main-text { fill: #f8fafc; }
      .sub-text { fill: #94a3b8; }
      .accent { fill: #3b82f6; }
    }
  </style>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <clipPath id="clip">
      <rect x="20" y="20" width="80" height="80" rx="18"/>
    </clipPath>
  </defs>

  <!-- Icon box -->
  <rect x="20" y="20" width="80" height="80" rx="18" fill="url(#grad)"/>

  <g clip-path="url(#clip)">

    <!-- grid -->
    <g stroke="white" stroke-width="1" opacity="0.12">
      <line x1="20" y1="40" x2="100" y2="40"/>
      <line x1="20" y1="60" x2="100" y2="60"/>
      <line x1="20" y1="80" x2="100" y2="80"/>

      <line x1="40" y1="20" x2="40" y2="100"/>
      <line x1="60" y1="20" x2="60" y2="100"/>
      <line x1="80" y1="20" x2="80" y2="100"/>
    </g>

    <!-- area -->
    <path d="M20 100 L20 70 L40 60 L60 65 L80 40 L100 50 L100 100 Z"
          fill="white" opacity="0.15"/>

  </g>

  <!-- main trend line -->
  <path d="M30 75 L45 55 L60 62 L80 38"
        stroke="white"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- points -->
  <circle cx="45" cy="55" r="3" fill="white"/>
  <circle cx="60" cy="62" r="3" fill="white"/>

  <!-- target -->
  <circle cx="80" cy="38" r="6" fill="white"/>
  <circle cx="80" cy="38" r="2" fill="#1d4ed8"/>

  <!-- Name -->
  <text x="130" y="60"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1"
        class="main-text">

    Market<tspan class="accent">Lab</tspan>
  </text>

  <!-- Subtitle -->
  <text x="132" y="90"
        font-family="ui-monospace, SFMono-Regular, Consolas, Menlo, monospace"
        font-size="13"
        font-weight="600"
        letter-spacing="3"
        class="sub-text">

    QUANTITATIVE RESEARCH FRAMEWORK
  </text>

</svg>
