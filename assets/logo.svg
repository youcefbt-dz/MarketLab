<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- تدرجات محسنة -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="iconGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="textAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- ظل ناعم -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- نمط الشبكة للخلفية -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>

    <!-- دوائر زخرفية -->
    <radialGradient id="glowCircle1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCircle2">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    :root {
      --bg: #0a0f1e;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --border: rgba(99, 102, 241, 0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --border: rgba(99, 102, 241, 0.1);
      }
    }

    .bg { fill: var(--bg); }
    .text-main { fill: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
    .text-sub { fill: var(--text-sub); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
    .border { stroke: var(--border); }
  </style>

  <!-- الخلفية -->
  <rect width="800" height="200" rx="24" class="bg"/>

  <!-- دوائر زخرفية في الخلفية -->
  <circle cx="120" cy="100" r="180" fill="url(#glowCircle1)"/>
  <circle cx="680" cy="80" r="140" fill="url(#glowCircle2)"/>

  <!-- نمط الشبكة -->
  <rect width="800" height="200" rx="24" fill="url(#grid)" class="text-sub" opacity="0.3"/>

  <!-- إطار خارجي -->
  <rect x="1" y="1" width="798" height="198" rx="23" class="border" fill="none" stroke-width="2"/>

  <!-- خط علوي متدرج -->
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#mainGradient)"/>

  <!-- ========== الأيقونة الرئيسية ========== -->
  <g transform="translate(50, 55)" filter="url(#softShadow)">
    <!-- خلفية الأيقونة -->
    <rect x="0" y="0" width="90" height="90" rx="22" fill="url(#mainGradient)"/>

    <!-- تأثير زجاجي داخل الأيقونة -->
    <rect x="0" y="0" width="90" height="45" rx="22" fill="url(#iconGradient)"/>

    <!-- لمعان علوي -->
    <rect x="4" y="4" width="82" height="35" rx="18" fill="url(#shimmer)"/>

    <!-- أعمدة الرسم البياني -->
    <rect x="18" y="62" width="10" height="16" rx="3" fill="white" opacity="0.35">
      <animate attributeName="height" values="16;20;16" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="62;58;62" dur="3s" repeatCount="indefinite"/>
    </rect>

    <rect x="33" y="48" width="10" height="30" rx="3" fill="white" opacity="0.6">
      <animate attributeName="height" values="30;36;30" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="48;42;48" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <rect x="48" y="34" width="10" height="44" rx="3" fill="white" opacity="0.85">
      <animate attributeName="height" values="44;52;44" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="34;26;34" dur="2s" repeatCount="indefinite"/>
    </rect>

    <rect x="63" y="20" width="10" height="58" rx="3" fill="white">
      <animate attributeName="height" values="58;66;58" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;12;20" dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- نقطة في الأعلى -->
    <circle cx="68" cy="14" r="5" fill="white" filter="url(#glow)"/>
  </g>

  <!-- ========== النص الرئيسي ========== -->
  <g transform="translate(170, 72)">
    <text x="0" y="42" font-size="48" font-weight="800" letter-spacing="-1.5" class="text-main">
      Market
      <tspan fill="url(#mainGradient)" font-weight="800">Lab</tspan>
    </text>
  </g>

  <!-- ========== النص الفرعي ========== -->
  <g transform="translate(175, 125)">
    <!-- شريط صغير قبل النص -->
    <rect x="0" y="3" width="3" height="12" rx="1.5" fill="url(#mainGradient)"/>

    <text x="10" y="14" font-size="12" font-weight="600" letter-spacing="3.5" class="text-sub">
      QUANTITATIVE RESEARCH FRAMEWORK
    </text>
  </g>

  <!-- ========== الوسم ========== -->
  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="url(#mainGradient)" opacity="0.1"/>
    <rect x="0" y="0" width="130" height="28" rx="14" fill="none" stroke="url(#mainGradient)" stroke-width="1" opacity="0.3"/>
    <text x="65" y="19" font-size="11" font-weight="600" fill="url(#textAccent)" text-anchor="middle" font-family="-apple-system, sans-serif">
      v2.0 BETA
    </text>
  </g>

  <!-- ========== نقاط زخرفية سفلية ========== -->
  <circle cx="700" cy="30" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="720" cy="50" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="690" cy="65" r="1" fill="#3b82f6" opacity="0.25"/>
</svg>
